<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Task Manager</h1>
      <form action="taskForm">
        <input type="text" id="title" placeholder="Task title" required />
        <input
          type="text"
          id="description"
          placeholder="Description"
          required
        />
        <button type="submit">Add Task</button>
      </form>
      <div id="taskList"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
